frontmatter:
- '# Resource Library'
- ''
- The searchable resource library for the [Talent Sourcing Command Center](../README.md) — the tools and resources sourcers and recruiters actually use 🕵️‍♀️, from AI sourcing platforms and OSINT to talent intelligence, outreach, and the people worth learning from.
- ''
- This started as a personal collection of scattered bookmarks and grew into a public resource for the whole community. We hope you find it useful!
- ''
- This is a work in progress and open source — if something is wrong or you want to add something, please read [CONTRIBUTING.md](CONTRIBUTING.md).
- ''
- '*Note: not everything here was discovered firsthand. Tools and resources are added after surfacing on Product Hunt, blogs, in the recruiting/sourcing community, and at conferences.*'
- ''
- '#### See this?'
- ''
- 💰 = no free or freemium version
- ''
- ❤️ = apps that I personally use A LOT and consider my favourites
- ''
- '---'
- ''
- '### Overview'
- ''
- '- [Start Here](#-start-here)'
- '- [Reports & Research](#-reports--research)'
- '- [Books & Reading Library](#-books--reading-library)'
- '- [AI Sourcing Platforms](#-ai-sourcing-platforms)'
- '- [Search & OSINT](#-search--osint)'
- '- [Contact Info & Enrichment](#-contact-info--enrichment)'
- '- [Outreach & Email](#-outreach--email)'
- '- [Talent Intelligence](#-talent-intelligence)'
- '- [ATS, CRM & Recruiting Ops](#-ats-crm--recruiting-ops)'
- '- [Job Descriptions & Inclusive Hiring](#-job-descriptions--inclusive-hiring)'
- '- [Screening & Interviews](#-screening--interviews)'
- '- [Scraping & Automation](#-scraping--automation)'
- '- [AI Writing & Productivity](#-ai-writing--productivity)'
- '- [Employer Brand & Job Marketing](#-employer-brand--job-marketing)'
- '- [Productivity & Browser Tools](#-productivity--browser-tools)'
- '- [Search Engines & Reference](#-search-engines--reference)'
- '- [Learning & Community](#-learning--community)'
- '- [Relocation, Compensation & Research](#-relocation-compensation--research)'
- ''
- '---'
