sections:
- heading: '## 🚀 Start Here'
  blocks:
  - raw: ''
  - raw: New to sourcing, or building your stack from scratch? Start with these. One battle-tested pick per job to be done — everything here is either free or has a usable free tier, except where marked 💰.
  - raw: ''
  - raw: '- **Find people** — [LinkedIn Recruiter](https://business.linkedin.com/talent-solutions/recruiter) 💰 if you have budget; [RecruitEm](https://recruitin.net) for free Google X-ray search.'
  - raw: '- **Build boolean strings** — [Balazs Boolean Builder](https://bit.ly/balazs_boolean) for free LinkedIn search.'
  - raw: '- **Get contact info** — [Hunter.io](https://hunter.io) (great free tier) or [ContactOut](https://contactout.com) 💰 for LinkedIn coverage.'
  - raw: '- **Reach out** — [SourceWhale](https://sourcewhale.com) 💰 for multi-channel sequences, or [Lemlist](https://lemlist.com) 💰 for cold email.'
  - raw: '- **Enrich & automate** — [Clay](https://clay.com) pulls candidate data from 50+ sources into one workflow.'
  - raw: '- **Write better job posts** — [Textio](https://textio.com) 💰 predicts how your language lands with candidates.'
  - raw: '- **Know the market** — [Levels.fyi](https://levels.fyi) for comp and [Layoffs.fyi](https://layoffs.fyi) for golden-window sourcing.'
  - raw: '- **Think & draft** — [Claude](https://claude.ai) for outreach, playbooks, boolean, and analysis.'
  - raw: '- **Practice** — [Sourcing Games](http://sourcing.games) to sharpen OSINT and boolean skills.'
  - raw: '- **Stay current** — [Recruiting Brainfood](https://recruitingbrainfood.com), the essential weekly newsletter by Hung Lee.'
  - raw: ''
  - raw: '---'
  - raw: ''
