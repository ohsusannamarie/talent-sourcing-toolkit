name: Generate resource indexes

on:
  push:
    branches:
      - main
    paths:
      - "List of 1,395 Google Custom Search Engines (CSEs).xlsx"
      - "List of 490 Chrome Extensions (Applicable to Talent Sourcing).docx"
      - "scripts/convert_resources_to_markdown.py"
      - "requirements.txt"
      - ".github/workflows/generate-resource-indexes.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate Markdown indexes
        run: python scripts/convert_resources_to_markdown.py

      - name: Commit generated indexes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add resources/generated/google-cses.md resources/generated/chrome-extensions.md
          if git diff --cached --quiet; then
            echo "No generated index changes to commit."
          else
            git commit -m "Generate markdown resource indexes"
            git push
          fi
